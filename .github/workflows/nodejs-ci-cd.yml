# FINAL STATUS
##########################################################

  pipeline-summary:
    runs-on: ubuntu-latest
    needs: [compile, sonarqube-scan, git-leakscan, trivy-scan, build]
    if: always()
    name: "Pipeline Summary"

    steps:
    - name: Check Pipeline Status
      run: |
        echo "✅ CI/CD Pipeline Complete!"
        echo ""
        echo "Jobs Status:"
        echo "  ✓ Compile: ${{ needs.compile.result }}"
        echo "  ✓ SonarQube: ${{ needs.sonarqube-scan.result }}"
        echo "  ✓ Gitleaks: ${{ needs.git-leakscan.result }}"
        echo "  ✓ Trivy: ${{ needs.trivy-scan.result }}"
        echo "  ✓ Build: ${{ needs.build.result }}"
        echo "  ✓ Docker: ${{ needs.docker-build.result }}"
