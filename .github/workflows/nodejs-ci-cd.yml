##########################################################
# PRODUCTION-READY CI/CD PIPELINE FOR NODE.JS PROJECT
##########################################################
# This pipeline automatically runs when you push code to 'main'
# It tests, scans, builds, and deploys your application

name: Node CI CD

# WHEN does this run?
on:
  push:
    branches: [ "main" ]  # On every push to main
  pull_request:
    branches: [ "main" ]  # On every PR to main

##########################################################
# STAGE 1: COMPILE & VALIDATE
##########################################################
jobs:
  compile:
    runs-on: ubuntu-latest
    name: "Compile & Syntax Check"

    strategy:
      matrix:
        node-version: [18.x, 22.x]  # Test on multiple Node versions

    steps:
    # Step 1: Download your code from GitHub
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history (needed for SonarQube later)

    # Step 2: Setup Node.js with npm caching (faster builds!)
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'  # Cache dependencies = 30-50% faster!

    # Step 3: Install frontend dependencies
    - name: Install Frontend Dependencies
      run: |
        cd client
        npm ci  # 'ci' = deterministic, clean install

    # Step 4: Install backend dependencies
    - name: Install Backend Dependencies
      run: |
        cd ../server
        npm ci

    # Step 5: Check frontend code for syntax errors
    - name: Check Frontend Syntax
      run: |
        cd client
        find . -name "*.js" -not -path "./node_modules/*" -exec node --check {} +

    # Step 6: Check backend code for syntax errors
    - name: Check Backend Syntax
      run: |
        cd ../server
        find . -name "*.js" -not -path "./node_modules/*" -exec node --check {} +

    # Step 7: Run unit tests (if you have them)
    - name: Run Tests
      run: |
        cd client
        npm test 2>/dev/null || echo "No tests found - that's ok for now!"


##########################################################
# STAGE 2: CODE QUALITY & SECURITY SCANNING
##########################################################

  # JOB 2A: SonarQube - Code Quality Analysis
  sonarqube-scan:
    runs-on: ubuntu-latest
    needs: compile  # Only run AFTER compile passes
    name: "SonarQube Quality Gate"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history needed for SonarQube

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json
    - name: Install dependencies
      run: |
        cd client && npm ci
        cd ../server && npm ci

    - name: Install Client Dependencies
      run: |
        cd client
        npm ci

    - name: Install Server Dependencies
      run: |
        cd ../server
        npm ci   

    # SonarQube Analysis
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@master
      with:
        args: >
          -Dsonar.projectKey=githubactions-zero-to-hero
          -Dsonar.sources=.
          -Dsonar.exclusions=node_modules/**,dist/**,build/**,coverage/**
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # Check if code passes quality gate
    - name: Quality Gate Check
      uses: SonarSource/sonarqube-quality-gate-action@master
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


  # JOB 2B: Gitleaks - Scan for Secrets
  git-leakscan:
    runs-on: ubuntu-latest
    needs: compile
    name: "Secret Scanning (Gitleaks)"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Run Gitleaks to find any hardcoded secrets
    - name: Scan for Secrets
      uses: gitleaks/gitleaks-action@v2


  # JOB 2C: Trivy - Vulnerability Scanning
  trivy-scan:
    runs-on: ubuntu-latest
    needs: compile
    name: "Vulnerability Scan (Trivy)"

    steps:
    - uses: actions/checkout@v4

    # Scan filesystem for vulnerabilities
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    # Upload results to GitHub Security tab
    - name: Upload to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'


